<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Quest: Салон Преображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: white;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .game-header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 20px 30px;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .step-indicator {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-select {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            font-size: 14px;
        }

        .progress-container {
            background: rgba(255,255,255,0.3);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fff 0%, #ffeaa7 100%);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Main Game Area */
        .game-main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Left Side - Photo */
        .photo-section {
            flex: 1;
            background: linear-gradient(180deg, #ffeaa8 0%, #fab1a0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
        }

        .photo-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            position: relative;
            background: #fff;
        }

        .client-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.6s ease;
        }

        .client-photo.fade-out {
            opacity: 0;
        }

        /* Steps List */
        .steps-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.98);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 10;
            min-width: 220px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            padding: 15px 18px;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0.4;
            cursor: default;
        }

        .step-item.active {
            opacity: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.08) translateX(5px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .step-item.completed {
            opacity: 1;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
        }

        .step-icon {
            font-size: 28px;
        }

        .step-text {
            font-size: 16px;
            font-weight: 600;
        }

        /* Right Side - Quiz */
        .quiz-section {
            width: 500px;
            background: white;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: -8px 0 30px rgba(0,0,0,0.1);
        }

        .question-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 35px;
            border-radius: 25px;
            margin-bottom: 35px;
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .question-title {
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
            font-weight: 700;
        }

        .question-hint {
            font-size: 15px;
            opacity: 0.95;
            font-style: italic;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .option-btn {
            padding: 25px;
            border: 3px solid #e0e0e0;
            background: white;
            border-radius: 18px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .option-btn:hover {
            border-color: #667eea;
            transform: translateX(8px) scale(1.02);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .option-btn.correct {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            color: white;
            border-color: #00b894;
            animation: correctPulse 0.7s ease;
        }

        .option-btn.wrong {
            background: linear-gradient(135deg, #d63031 0%, #e17055 100%);
            color: white;
            border-color: #d63031;
            animation: shake 0.6s ease;
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        .feedback-message {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.4s ease;
        }

        .feedback-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback-message.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            box-shadow: 0 5px 15px rgba(21, 87, 36, 0.2);
        }

        .feedback-message.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            box-shadow: 0 5px 15px rgba(114, 28, 36, 0.2);
        }

        /* Final Screen */
        .final-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .final-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .final-title {
            font-size: 56px;
            margin-bottom: 25px;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            animation: bounce 1.2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        .final-stats {
            background: rgba(255,255,255,0.25);
            padding: 40px 70px;
            border-radius: 25px;
            margin: 35px 0;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .stat-item {
            font-size: 26px;
            margin: 20px 0;
            font-weight: 600;
        }

        .final-btn {
            padding: 25px 60px;
            font-size: 26px;
            background: white;
            color: #f5576c;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .final-btn:hover {
            transform: translateY(-8px) scale(1.08);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        /* Sparkles */
        .sparkle {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle, #fff 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleAnim 1.2s ease-out forwards;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        @keyframes sparkleAnim {
            0% { transform: scale(0) rotate(0deg); opacity: 1; }
            100% { transform: scale(2.5) rotate(180deg); opacity: 0; }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            top: -20px;
            animation: confettiFall 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .game-main {
                flex-direction: column;
            }
            
            .quiz-section {
                width: 100%;
                height: 45%;
                padding: 30px;
            }
            
            .photo-section {
                height: 55%;
            }
            
            .photo-container {
                height: 400px;
            }
        }
    </style>
</head>
<body>

<div class="game-container" id="gameContainer">
    <!-- Header -->
    <div class="game-header">
        <div class="header-top">
            <div class="step-indicator">
                <span>✨</span>
                <span>Этап <span id="currentStep">1</span>/<span id="totalSteps">5</span></span>
            </div>
            <div class="controls">
                <select class="control-select" id="difficultySelect">
                    <option value="novice">🌸 Новичок</option>
                    <option value="pro" selected>💄 Профи</option>
                    <option value="master">✨ Мастер</option>
                </select>
                <select class="control-select" id="themeSelect">
                    <option value="glamour">🎀 Гламур</option>
                    <option value="minimal">⚫ Минимализм</option>
                    <option value="vintage">🕰 Винтаж</option>
                </select>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="game-main">
        <!-- Photo Section -->
        <div class="photo-section">
            <div class="steps-panel">
                <div class="step-item active" data-step="0">
                    <span class="step-icon">🌸</span>
                    <span class="step-text">Базовый</span>
                </div>
                <div class="step-item" data-step="1">
                    <span class="step-icon">💇‍♀️</span>
                    <span class="step-text">Укладка</span>
                </div>
                <div class="step-item" data-step="2">
                    <span class="step-icon">💄</span>
                    <span class="step-text">Макияж</span>
                </div>
                <div class="step-item" data-step="3">
                    <span class="step-icon">👗</span>
                    <span class="step-text">Наряд</span>
                </div>
                <div class="step-item" data-step="4">
                    <span class="step-icon">💍</span>
                    <span class="step-text">Финал</span>
                </div>
            </div>

            <div class="photo-container" id="photoContainer">
                <img src="" alt="Client" class="client-photo" id="clientPhoto">
            </div>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-section">
            <div class="question-card">
                <div class="question-title" id="questionText">Загрузка вопроса...</div>
                <div class="question-hint">Выберите правильный вариант ответа</div>
            </div>
            <div class="options-list" id="optionsList"></div>
            <div class="feedback-message" id="feedbackMessage"></div>
        </div>
    </div>

    <!-- Final Screen -->
    <div class="final-screen" id="finalScreen">
        <h1 class="final-title">🎉 Клиент в восторге!</h1>
        <div class="final-stats">
            <div class="stat-item">✨ Вы завершили образ</div>
            <div class="stat-item">📊 Точность: <span id="finalAccuracy">100%</span></div>
            <div class="stat-item">💰 Награда: <span id="finalReward">50</span> монет</div>
            <div class="stat-item">🏆 Уровень: <span id="finalLevel">Мастер</span></div>
        </div>
        <button class="final-btn" onclick="game.restart()">🔄 Новый клиент</button>
    </div>
</div>

<script>
class BeautyQuestGame {
    constructor() {
        this.config = {
            currentStep: 0,
            totalSteps: 5,  // 5 этапов
            difficulty: 'pro',
            theme: 'glamour',
            correctAnswers: 0,
            totalAnswers: 0,
            
            // ✅ ВАШИ ФОТО ИЗ РЕПОЗИТОРИЯ
            photos: [
                "1.jpg",  // Базовое фото
                "2.jpg",  // + Укладка
                "3.jpg",  // + Макияж
                "4.jpg",  // + Наряд
                "5.jpg"   // Финал (с украшениями)
            ],
            
            questions: [
                {
                    text: "Какую причёску сделать клиентке?",
                    hint: "Элегантная укладка для особого случая",
                    options: [
                        { text: "Распущенные волосы", icon: "💁‍♀️", correct: false, photoIndex: 0 },
                        { text: "Элегантная укладка", icon: "💇‍♀️", correct: true, photoIndex: 1 },
                        { text: "Конский хвост", icon: "🎀", correct: false, photoIndex: 0 }
                    ],
                    correctPhotoIndex: 1
                },
                {
                    text: "Какой макияж выбрать?",
                    hint: "Яркий вечерний макияж",
                    options: [
                        { text: "Натуральный", icon: "🌸", correct: false, photoIndex: 1 },
                        { text: "Яркая помада", icon: "💋", correct: true, photoIndex: 2 },
                        { text: "Блеск для губ", icon: "✨", correct: false, photoIndex: 1 }
                    ],
                    correctPhotoIndex: 2
                },
                {
                    text: "Какое платье надеть?",
                    hint: "Элегантное вечернее",
                    options: [
                        { text: "Повседневное", icon: "👚", correct: false, photoIndex: 2 },
                        { text: "Вечернее платье", icon: "👗", correct: true, photoIndex: 3 },
                        { text: "Спортивное", icon: "👟", correct: false, photoIndex: 2 }
                    ],
                    correctPhotoIndex: 3
                },
                {
                    text: "Какие украшения добавить?",
                    hint: "Роскошные украшения для завершения образа",
                    options: [
                        { text: "Без украшений", icon: "❌", correct: false, photoIndex: 3 },
                        { text: "Колье и серьги", icon: "💎", correct: true, photoIndex: 4 },
                        { text: "Только браслет", icon: "⌚", correct: false, photoIndex: 3 }
                    ],
                    correctPhotoIndex: 4
                }
            ]
        };

        this.ui = {
            currentStep: document.getElementById('currentStep'),
            totalSteps: document.getElementById('totalSteps'),
            progressBar: document.getElementById('progressBar'),
            questionText: document.getElementById('questionText'),
            optionsList: document.getElementById('optionsList'),
            feedbackMessage: document.getElementById('feedbackMessage'),
            finalScreen: document.getElementById('finalScreen'),
            clientPhoto: document.getElementById('clientPhoto'),
            photoContainer: document.getElementById('photoContainer'),
            difficultySelect: document.getElementById('difficultySelect'),
            themeSelect: document.getElementById('themeSelect'),
            gameContainer: document.getElementById('gameContainer')
        };

        this.init();
    }

    init() {
        this.ui.totalSteps.textContent = this.config.totalSteps;
        
        // Load base photo
        this.ui.clientPhoto.src = this.config.photos[0];
        
        this.ui.difficultySelect.addEventListener('change', (e) => {
            this.config.difficulty = e.target.value;
        });

        this.ui.themeSelect.addEventListener('change', (e) => {
            this.config.theme = e.target.value;
        });

        this.loadQuestion();
    }

    loadQuestion() {
        if (this.config.currentStep >= this.config.questions.length) {
            this.finishGame();
            return;
        }

        const question = this.config.questions[this.config.currentStep];
        
        this.ui.currentStep.textContent = this.config.currentStep + 1;
        const progress = ((this.config.currentStep) / this.config.totalSteps) * 100;
        this.ui.progressBar.style.width = progress + '%';

        this.ui.questionText.textContent = question.text;
        this.ui.optionsList.innerHTML = '';

        question.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span style="font-size: 32px">${option.icon}</span> <span>${option.text}</span>`;
            btn.onclick = () => this.checkAnswer(index, option.correct, btn, option.photoIndex);
            this.ui.optionsList.appendChild(btn);
        });

        document.querySelectorAll('.step-item').forEach((item, index) => {
            item.classList.remove('active', 'completed');
            if (index < this.config.currentStep) {
                item.classList.add('completed');
            } else if (index === this.config.currentStep) {
                item.classList.add('active');
            }
        });

        this.ui.feedbackMessage.className = 'feedback-message';
        this.ui.feedbackMessage.textContent = '';
    }

    checkAnswer(selectedIndex, isCorrect, btnElement, photoIndex) {
        this.config.totalAnswers++;
        
        const buttons = this.ui.optionsList.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.style.pointerEvents = 'none');

        if (isCorrect) {
            this.config.correctAnswers++;
            btnElement.classList.add('correct');
            this.showFeedback('Применяем преображение... ✨', 'success');
            
            setTimeout(() => {
                this.applyTransformation(photoIndex);
            }, 1000);
        } else {
            btnElement.classList.add('wrong');
            this.showFeedback('Попробуйте ещё раз! 💪', 'error');
            
            setTimeout(() => {
                btnElement.classList.remove('wrong');
                buttons.forEach(btn => btn.style.pointerEvents = 'all');
                this.ui.feedbackMessage.classList.remove('show');
            }, 1500);
        }
    }

    showFeedback(text, type) {
        this.ui.feedbackMessage.textContent = text;
        this.ui.feedbackMessage.className = `feedback-message show ${type}`;
    }

    applyTransformation(photoIndex) {
        // Fade out effect
        this.ui.clientPhoto.classList.add('fade-out');
        
        setTimeout(() => {
            // Change photo
            this.ui.clientPhoto.src = this.config.photos[photoIndex];
            
            // Fade in when loaded
            this.ui.clientPhoto.onload = () => {
                this.ui.clientPhoto.classList.remove('fade-out');
            };
        }, 600);

        this.createSparkles();

        setTimeout(() => {
            this.config.currentStep++;
            this.loadQuestion();
        }, 1500);
    }

    createSparkles() {
        const rect = this.ui.photoContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                const angle = (Math.random() * Math.PI * 2);
                const distance = 120 + Math.random() * 120;
                const x = centerX + Math.cos(angle) * distance - 17.5;
                const y = centerY + Math.sin(angle) * distance - 17.5;
                sparkle.style.left = x + 'px';
                sparkle.style.top = y + 'px';
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1200);
            }, i * 60);
        }
    }

    finishGame() {
        const accuracy = Math.round((this.config.correctAnswers / this.config.totalAnswers) * 100);
        const reward = this.config.correctAnswers * 10;
        
        document.getElementById('finalAccuracy').textContent = accuracy + '%';
        document.getElementById('finalReward').textContent = reward;
        
        let level = 'Новичок';
        if (accuracy >= 80) level = 'Профи';
        if (accuracy === 100) level = 'Мастер';
        document.getElementById('finalLevel').textContent = level;

        this.ui.progressBar.style.width = '100%';
        this.createConfetti();
        
        setTimeout(() => {
            this.ui.finalScreen.classList.add('show');
        }, 500);
    }

    createConfetti() {
        const colors = ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b', '#fa709a'];
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }, i * 50);
        }
    }

    restart() {
        this.config.currentStep = 0;
        this.config.correctAnswers = 0;
        this.config.totalAnswers = 0;
        
        // Reset to base photo
        this.ui.clientPhoto.classList.add('fade-out');
        setTimeout(() => {
            this.ui.clientPhoto.src = this.config.photos[0];
            this.ui.clientPhoto.classList.remove('fade-out');
        }, 600);
        
        this.ui.finalScreen.classList.remove('show');
        this.loadQuestion();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    window.game = new BeautyQuestGame();
});
</script>

</body>
</html>
