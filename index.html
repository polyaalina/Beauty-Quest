<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Quest: Салон Преображений</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #93c5dd 0%, #c67a8f 50%, #e6d480 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .game-container {
            width: 100%;
            max-width: 1200px;
            height: 90vh;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* START SCREEN */
        .start-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #93c5dd 0%, #c67a8f 50%, #e6d480 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            color: white;
        }

        .start-screen.hidden {
            display: none;
        }

        .salon-title {
            font-size: 72px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            margin-bottom: 20px;
            animation: titleGlow 2s ease infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 4px 4px 8px rgba(0,0,0,0.3), 0 0 20px rgba(255,255,255,0.5); }
            50% { text-shadow: 4px 4px 8px rgba(0,0,0,0.3), 0 0 40px rgba(255,255,255,0.8); }
        }

        .salon-subtitle {
            font-size: 32px;
            margin-bottom: 60px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .start-btn {
            padding: 30px 80px;
            font-size: 28px;
            background: linear-gradient(180deg, #ffffff 0%, #f0f0f0 100%);
            color: #c67a8f;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 
                0 10px 0 #d0d0d0,
                0 20px 50px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            position: relative;
            top: 0;
        }

        .start-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 15px 0 #d0d0d0,
                0 25px 60px rgba(0,0,0,0.4);
        }

        .start-btn:active {
            top: 8px;
            box-shadow: 
                0 2px 0 #d0d0d0,
                0 10px 30px rgba(0,0,0,0.3);
        }

        /* Header */
        .game-header {
            background: linear-gradient(135deg, #9cb9ce 0%, #c67a8f 100%);
            padding: 20px 30px;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .step-indicator {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .control-select {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            background: rgba(255,255,255,0.9);
            color: #6f8d9d;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            font-size: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .progress-container {
            background: rgba(255,255,255,0.4);
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #fff 0%, #ffcc99 100%);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        /* Main Game Area */
        .game-main {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* Left Side - Photo */
        .photo-section {
            flex: 1;
            background: linear-gradient(180deg, rgba(147, 197, 221, 0.2) 0%, rgba(198, 122, 143, 0.2) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 30px 30px 280px;
            position: relative;
        }

        .photo-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 25px 70px rgba(0,0,0,0.3);
            position: relative;
            background: #fff;
            border: 5px solid rgba(156, 185, 206, 0.5);
        }

        .client-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.6s ease;
        }

        .client-photo.fade-out {
            opacity: 0;
        }

        /* Magic Wand Animation */
        .magic-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            overflow: visible;
        }

        .magic-wand {
            position: absolute;
            width: 100px;
            height: 100px;
            background: url('https://cdn-icons-png.flaticon.com/512/3062/3062652.png') no-repeat center center;
            background-size: contain;
            filter: drop-shadow(0 0 30px rgba(255,215,0,1)) drop-shadow(0 0 60px rgba(255,105,180,0.8));
            animation: magicWave 2.5s ease-in-out;
        }

        @keyframes magicWave {
            0% {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(0deg) scale(0.3);
                opacity: 0;
            }
            10% {
                opacity: 1;
                transform: translate(-50%, -50%) rotate(45deg) scale(1);
            }
            25% {
                top: 30%;
                left: 60%;
                transform: translate(-50%, -50%) rotate(120deg) scale(1.1);
            }
            50% {
                top: 40%;
                left: 30%;
                transform: translate(-50%, -50%) rotate(200deg) scale(1);
            }
            75% {
                top: 70%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(280deg) scale(1.05);
            }
            90% {
                top: 50%;
                left: 50%;
                opacity: 1;
                transform: translate(-50%, -50%) rotate(340deg) scale(0.9);
            }
            100% {
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(360deg) scale(0.3);
                opacity: 0;
            }
        }

        /* Magical Stars */
        .magic-star {
            position: absolute;
            width: 35px;
            height: 35px;
            background: url('https://cdn-icons-png.flaticon.com/512/867/867856.png') no-repeat center center;
            background-size: contain;
            pointer-events: none;
            filter: drop-shadow(0 0 15px rgba(255,215,0,1));
            animation: starOrbit 2s ease-out forwards;
        }

        @keyframes starOrbit {
            0% {
                opacity: 0;
                transform: scale(0) rotate(0deg);
            }
            20% {
                opacity: 1;
                transform: scale(1.4) rotate(72deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.3) rotate(360deg) translateY(-100px);
            }
        }

        /* Sparkle particles */
        .sparkle-particle {
            position: absolute;
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,215,0,0.9) 40%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleBurst 1.5s ease-out forwards;
            box-shadow: 0 0 20px rgba(255,215,0,0.8);
        }

        @keyframes sparkleBurst {
            0% {
                opacity: 1;
                transform: scale(0) translate(0, 0);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.3) translate(var(--tx), var(--ty));
            }
            100% {
                opacity: 0;
                transform: scale(0.3) translate(calc(var(--tx) * 2.5), calc(var(--ty) * 2.5));
            }
        }

        /* Steps Panel */
        .steps-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.98);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            z-index: 10;
            min-width: 220px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin: 15px 0;
            padding: 15px 18px;
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0.5;
            cursor: default;
            /* 3D convex effect */
            background: linear-gradient(180deg, #93c5dd 0%, #6f8d9d 100%);
            box-shadow: 
                0 6px 0 #5a7080,
                0 10px 10px rgba(0,0,0,0.2),
                inset 0 2px 5px rgba(255,255,255,0.4);
            color: white;
            position: relative;
            top: 0;
        }

        .step-item:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 0 #5a7080,
                0 15px 20px rgba(0,0,0,0.25),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .step-item:active {
            top: 4px;
            box-shadow: 
                0 2px 0 #5a7080,
                0 5px 10px rgba(0,0,0,0.2),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .step-item.active {
            opacity: 1;
            background: linear-gradient(180deg, #c67a8f 0%, #a86075 100%);
            box-shadow: 
                0 6px 0 #8a5060,
                0 10px 10px rgba(198, 122, 143, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
            transform: scale(1.05) translateX(5px);
        }

        .step-item.completed {
            opacity: 1;
            background: linear-gradient(180deg, #9cb9ce 0%, #7a90a5 100%);
            box-shadow: 
                0 6px 0 #657890,
                0 10px 10px rgba(156, 185, 206, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .step-icon {
            width: 32px;
            height: 32px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: brightness(0) invert(1);
        }

        .step-text {
            font-size: 16px;
            font-weight: 600;
        }

        /* Right Side - Quiz */
        .quiz-section {
            width: 500px;
            background: rgba(255, 255, 255, 0.98);
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: -8px 0 30px rgba(0,0,0,0.1);
        }

        .question-card {
            background: linear-gradient(180deg, #9cb9ce 0%, #6f8d9d 100%);
            color: white;
            padding: 35px;
            border-radius: 25px;
            margin-bottom: 35px;
            box-shadow: 
                0 8px 0 #5a7080,
                0 15px 30px rgba(111, 141, 157, 0.4);
            position: relative;
            top: 0;
        }

        .question-title {
            font-size: 28px;
            margin-bottom: 15px;
            line-height: 1.3;
            font-weight: 700;
        }

        .question-hint {
            font-size: 15px;
            opacity: 0.95;
            font-style: italic;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        /* 3D Convex Buttons */
        .option-btn {
            padding: 25px;
            border: none;
            background: linear-gradient(180deg, #93c5dd 0%, #6f8d9d 100%);
            color: white;
            border-radius: 18px;
            cursor: pointer;
            font-size: 17px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 
                0 6px 0 #5a7080,
                0 10px 10px rgba(0,0,0,0.2),
                inset 0 2px 5px rgba(255,255,255,0.4);
            position: relative;
            top: 0;
        }

        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 0 #5a7080,
                0 15px 20px rgba(0,0,0,0.25),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .option-btn:active {
            top: 4px;
            box-shadow: 
                0 2px 0 #5a7080,
                0 5px 10px rgba(0,0,0,0.2),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .option-btn.correct {
            background: linear-gradient(180deg, #9cb9ce 0%, #7a90a5 100%);
            box-shadow: 
                0 6px 0 #657890,
                0 10px 10px rgba(156, 185, 206, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
            animation: correctPulse 0.7s ease;
        }

        .option-btn.correct:active {
            top: 4px;
            box-shadow: 
                0 2px 0 #657890,
                0 5px 10px rgba(156, 185, 206, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        .option-btn.wrong {
            background: linear-gradient(180deg, #c67a8f 0%, #a86075 100%);
            box-shadow: 
                0 6px 0 #8a5060,
                0 10px 10px rgba(198, 122, 143, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
            animation: shake 0.6s ease;
        }

        .option-btn.wrong:active {
            top: 4px;
            box-shadow: 
                0 2px 0 #8a5060,
                0 5px 10px rgba(198, 122, 143, 0.4),
                inset 0 2px 5px rgba(255,255,255,0.4);
        }

        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-12px); }
            40%, 80% { transform: translateX(12px); }
        }

        .feedback-message {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
            opacity: 0;
            transform: translateY(-15px);
            transition: all 0.4s ease;
        }

        .feedback-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback-message.success {
            background: linear-gradient(180deg, #9cb9ce 0%, #7a90a5 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(122, 144, 165, 0.3);
        }

        .feedback-message.error {
            background: linear-gradient(180deg, #c67a8f 0%, #a86075 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(168, 96, 117, 0.3);
        }

        /* Final Screen with Before-After */
        .final-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #93c5dd 0%, #c67a8f 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            padding: 40px;
        }

        .final-screen.show {
            opacity: 1;
            pointer-events: all;
        }

        .final-title {
            font-size: 56px;
            margin-bottom: 25px;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.3);
            animation: bounce 1.2s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-25px); }
        }

        /* Before-After Gallery */
        .before-after-container {
            display: flex;
            gap: 30px;
            margin: 30px 0;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .photo-comparison {
            text-align: center;
        }

        .photo-comparison-label {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .photo-comparison img {
            width: 250px;
            height: 350px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            border: 5px solid white;
        }

        .transformation-arrow {
            font-size: 60px;
            animation: arrowPulse 1.5s ease infinite;
        }

        @keyframes arrowPulse {
            0%, 100% { transform: translateX(0) scale(1); opacity: 1; }
            50% { transform: translateX(10px) scale(1.1); opacity: 0.8; }
        }

        .final-stats {
            background: rgba(255,255,255,0.25);
            padding: 30px 60px;
            border-radius: 25px;
            margin: 25px 0;
            backdrop-filter: blur(15px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .stat-item {
            font-size: 24px;
            margin: 15px 0;
            font-weight: 600;
        }

        /* 3D New Client Button */
        .final-btn {
            padding: 25px 60px;
            font-size: 24px;
            background: linear-gradient(180deg, #9cb9ce 0%, #6f8d9d 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 
                0 8px 0 #5a7080,
                0 15px 40px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            top: 0;
            margin-top: 20px;
        }

        .final-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 
                0 12px 0 #5a7080,
                0 20px 50px rgba(0,0,0,0.4);
        }

        .final-btn:active {
            top: 6px;
            box-shadow: 
                0 2px 0 #5a7080,
                0 10px 30px rgba(0,0,0,0.3);
        }

        /* Mouse Trail Hearts and Stars */
        .mouse-trail {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            font-size: 24px;
            animation: trailFade 1s ease-out forwards;
        }

        @keyframes trailFade {
            0% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: scale(0.3) rotate(180deg) translateY(-50px);
            }
        }

        /* Confetti */
        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            top: -20px;
            animation: confettiFall 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .game-main {
                flex-direction: column;
            }
            
            .photo-section {
                padding: 30px;
            }
            
            .steps-panel {
                position: relative;
                left: 0;
                top: 0;
                margin-bottom: 20px;
            }
            
            .quiz-section {
                width: 100%;
                height: 45%;
                padding: 30px;
            }
            
            .photo-container {
                height: 400px;
            }

            .before-after-container {
                flex-direction: column;
            }

            .transformation-arrow {
                transform: rotate(90deg);
            }

            .salon-title {
                font-size: 48px;
            }

            .salon-subtitle {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div class="start-screen" id="startScreen">
    <h1 class="salon-title">✨ Beauty Quest ✨</h1>
    <p class="salon-subtitle">Салон Преображений</p>
    <button class="start-btn" onclick="game.startGame()">🎀 Начать игру</button>
</div>

<div class="game-container" id="gameContainer">
    <!-- Header -->
    <div class="game-header">
        <div class="header-top">
            <div class="step-indicator">
                <span>✨</span>
                <span>Этап <span id="currentStep">1</span>/<span id="totalSteps">5</span></span>
            </div>
            <div class="controls">
                <select class="control-select" id="difficultySelect">
                    <option value="novice">🌸 Новичок</option>
                    <option value="pro" selected>💄 Профи</option>
                    <option value="master">✨ Мастер</option>
                </select>
                <select class="control-select" id="themeSelect">
                    <option value="glamour">🎀 Гламур</option>
                    <option value="minimal">⚫ Минимализм</option>
                    <option value="vintage">🕰 Винтаж</option>
                </select>
            </div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <!-- Main Game Area -->
    <div class="game-main">
        <!-- Photo Section -->
        <div class="photo-section">
            <div class="steps-panel">
                <div class="step-item active" data-step="0">
                    <img src="https://cdn-icons-png.flaticon.com/512/3408/3408679.png" alt="" class="step-icon">
                    <span class="step-text">Начало работы</span>
                </div>
                <div class="step-item" data-step="1">
                    <img src="https://cdn-icons-png.flaticon.com/512/4138/4138621.png" alt="" class="step-icon">
                    <span class="step-text">Укладка</span>
                </div>
                <div class="step-item" data-step="2">
                    <img src="https://cdn-icons-png.flaticon.com/512/4138/4138667.png" alt="" class="step-icon">
                    <span class="step-text">Макияж</span>
                </div>
                <div class="step-item" data-step="3">
                    <img src="https://cdn-icons-png.flaticon.com/512/8613/8613684.png" alt="" class="step-icon">
                    <span class="step-text">Наряд</span>
                </div>
                <div class="step-item" data-step="4">
                    <img src="https://cdn-icons-png.flaticon.com/512/2936/2936886.png" alt="" class="step-icon">
                    <span class="step-text">Финал</span>
                </div>
            </div>

            <div class="photo-container" id="photoContainer">
                <img src="" alt="Client" class="client-photo" id="clientPhoto">
                <div class="magic-container" id="magicContainer"></div>
            </div>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-section">
            <div class="question-card">
                <div class="question-title" id="questionText">Загрузка вопроса...</div>
                <div class="question-hint">Выберите правильный вариант ответа</div>
            </div>
            <div class="options-list" id="optionsList"></div>
            <div class="feedback-message" id="feedbackMessage"></div>
        </div>
    </div>

    <!-- Final Screen with Before-After -->
    <div class="final-screen" id="finalScreen">
        <h1 class="final-title">🎉 Клиент в восторге!</h1>
        
        <div class="before-after-container">
            <div class="photo-comparison">
                <div class="photo-comparison-label">✨ Было</div>
                <img src="" alt="Before" id="beforePhoto">
            </div>
            <div class="transformation-arrow">➡️</div>
            <div class="photo-comparison">
                <div class="photo-comparison-label">🌟 Стало</div>
                <img src="" alt="After" id="afterPhoto">
            </div>
        </div>

        <div class="final-stats">
            <div class="stat-item">✨ Вы завершили образ</div>
            <div class="stat-item">📊 Точность: <span id="finalAccuracy">100%</span></div>
            <div class="stat-item">💰 Награда: <span id="finalReward">50</span> монет</div>
            <div class="stat-item">🏆 Уровень: <span id="finalLevel">Мастер</span></div>
        </div>
        <button class="final-btn" onclick="game.restart()">🔄 Новый клиент</button>
    </div>
</div>

<script>
class BeautyQuestGame {
    constructor() {
        this.config = {
            currentStep: 0,
            totalSteps: 5,
            difficulty: 'pro',
            theme: 'glamour',
            correctAnswers: 0,
            totalAnswers: 0,
            gameStarted: false,
            
            photos: [
                "1.jpg",
                "2.jpg",
                "3.jpg",
                "4.jpg",
                "5.jpg"
            ],
            
            questions: [
                {
                    text: "Какую причёску сделать клиентке?",
                    hint: "Элегантная укладка для особого случая",
                    options: [
                        { text: "Распущенные волосы", icon: "💁‍♀️", correct: false, photoIndex: 0 },
                        { text: "Элегантная укладка", icon: "💇‍♀️", correct: true, photoIndex: 1 },
                        { text: "Конский хвост", icon: "🎀", correct: false, photoIndex: 0 }
                    ],
                    correctPhotoIndex: 1
                },
                {
                    text: "Какой макияж выбрать?",
                    hint: "Яркий вечерний макияж",
                    options: [
                        { text: "Натуральный", icon: "🌸", correct: false, photoIndex: 1 },
                        { text: "Яркая помада", icon: "💋", correct: true, photoIndex: 2 },
                        { text: "Блеск для губ", icon: "✨", correct: false, photoIndex: 1 }
                    ],
                    correctPhotoIndex: 2
                },
                {
                    text: "Какое платье надеть?",
                    hint: "Элегантное вечернее",
                    options: [
                        { text: "Повседневное", icon: "👚", correct: false, photoIndex: 2 },
                        { text: "Вечернее платье", icon: "👗", correct: true, photoIndex: 3 },
                        { text: "Спортивное", icon: "👟", correct: false, photoIndex: 2 }
                    ],
                    correctPhotoIndex: 3
                },
                {
                    text: "Какие украшения добавить?",
                    hint: "Роскошные украшения",
                    options: [
                        { text: "Без украшений", icon: "❌", correct: false, photoIndex: 3 },
                        { text: "Колье и серьги", icon: "💎", correct: true, photoIndex: 4 },
                        { text: "Только браслет", icon: "⌚", correct: false, photoIndex: 3 }
                    ],
                    correctPhotoIndex: 4
                }
            ]
        };

        this.ui = {
            startScreen: document.getElementById('startScreen'),
            currentStep: document.getElementById('currentStep'),
            totalSteps: document.getElementById('totalSteps'),
            progressBar: document.getElementById('progressBar'),
            questionText: document.getElementById('questionText'),
            optionsList: document.getElementById('optionsList'),
            feedbackMessage: document.getElementById('feedbackMessage'),
            finalScreen: document.getElementById('finalScreen'),
            clientPhoto: document.getElementById('clientPhoto'),
            beforePhoto: document.getElementById('beforePhoto'),
            afterPhoto: document.getElementById('afterPhoto'),
            photoContainer: document.getElementById('photoContainer'),
            magicContainer: document.getElementById('magicContainer'),
            difficultySelect: document.getElementById('difficultySelect'),
            themeSelect: document.getElementById('themeSelect'),
            gameContainer: document.getElementById('gameContainer')
        };

        this.init();
    }

    init() {
        this.ui.totalSteps.textContent = this.config.totalSteps;
        
        this.ui.difficultySelect.addEventListener('change', (e) => {
            this.config.difficulty = e.target.value;
        });

        this.ui.themeSelect.addEventListener('change', (e) => {
            this.config.theme = e.target.value;
        });

        // Mouse trail effect
        this.initMouseTrail();
    }

    startGame() {
        this.config.gameStarted = true;
        this.ui.startScreen.classList.add('hidden');
        this.ui.clientPhoto.src = this.config.photos[0];
        this.loadQuestion();
    }

    initMouseTrail() {
        const trailItems = ['💖', '⭐', '✨', '💫', '🌟'];
        let lastTrailTime = 0;
        
        document.addEventListener('mousemove', (e) => {
            const currentTime = Date.now();
            if (currentTime - lastTrailTime > 100) { // Create trail every 100ms
                lastTrailTime = currentTime;
                
                const trail = document.createElement('div');
                trail.className = 'mouse-trail';
                trail.textContent = trailItems[Math.floor(Math.random() * trailItems.length)];
                trail.style.left = e.clientX + 'px';
                trail.style.top = e.clientY + 'px';
                document.body.appendChild(trail);
                
                setTimeout(() => trail.remove(), 1000);
            }
        });
    }

    createMagicWand() {
        const container = this.ui.magicContainer;
        container.innerHTML = '';
        
        // Create magic wand
        const wand = document.createElement('div');
        wand.className = 'magic-wand';
        container.appendChild(wand);
        
        // Create stars in circular pattern
        const starCount = 8;
        for (let i = 0; i < starCount; i++) {
            setTimeout(() => {
                const angle = (i / starCount) * Math.PI * 2;
                const radius = 150;
                const x = Math.cos(angle) * radius + container.offsetWidth / 2;
                const y = Math.sin(angle) * radius + container.offsetHeight / 2;
                
                const star = document.createElement('div');
                star.className = 'magic-star';
                star.style.left = x + 'px';
                star.style.top = y + 'px';
                star.style.transform = `rotate(${i * 45}deg)`;
                container.appendChild(star);
                
                // Create sparkle particles from star
                for (let j = 0; j < 6; j++) {
                    setTimeout(() => {
                        this.createSparkleParticle(x, y);
                    }, j * 80);
                }
                
                setTimeout(() => star.remove(), 2000);
            }, i * 200);
        }
        
        setTimeout(() => {
            wand.remove();
        }, 2500);
    }

    createSparkleParticle(x, y) {
        const particle = document.createElement('div');
        particle.className = 'sparkle-particle';
        
        const angle = (Math.random() * Math.PI * 2);
        const distance = 40 + Math.random() * 80;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        particle.style.left = x + 'px';
        particle.style.top = y + 'px';
        
        this.ui.magicContainer.appendChild(particle);
        setTimeout(() => particle.remove(), 1500);
    }

    shuffleArray(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    loadQuestion() {
        if (this.config.currentStep >= this.config.questions.length) {
            this.finishGame();
            return;
        }

        const question = this.config.questions[this.config.currentStep];
        
        this.ui.currentStep.textContent = this.config.currentStep + 1;
        const progress = ((this.config.currentStep) / this.config.totalSteps) * 100;
        this.ui.progressBar.style.width = progress + '%';

        this.ui.questionText.textContent = question.text;
        this.ui.optionsList.innerHTML = '';

        // Shuffle options randomly
        const shuffledOptions = this.shuffleArray(question.options);

        shuffledOptions.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span style="font-size: 32px">${option.icon}</span> <span>${option.text}</span>`;
            btn.onclick = () => this.checkAnswer(option.correct, btn, option.photoIndex);
            this.ui.optionsList.appendChild(btn);
        });

        // Update steps with consistent colors
        document.querySelectorAll('.step-item').forEach((item, index) => {
            item.classList.remove('active', 'completed');
            if (index < this.config.currentStep) {
                item.classList.add('completed');
            } else if (index === this.config.currentStep) {
                item.classList.add('active');
            }
        });

        this.ui.feedbackMessage.className = 'feedback-message';
        this.ui.feedbackMessage.textContent = '';
    }

    checkAnswer(isCorrect, btnElement, photoIndex) {
        this.config.totalAnswers++;
        
        const buttons = this.ui.optionsList.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (isCorrect) {
            this.config.correctAnswers++;
            btnElement.classList.add('correct');
            this.showFeedback('Применяем преображение... ✨', 'success');
            
            setTimeout(() => {
                this.applyTransformation(photoIndex);
            }, 1000);
        } else {
            btnElement.classList.add('wrong');
            this.showFeedback('Попробуйте ещё раз! 💪', 'error');
            
            setTimeout(() => {
                btnElement.classList.remove('wrong');
                buttons.forEach(btn => btn.disabled = false);
                this.ui.feedbackMessage.classList.remove('show');
            }, 1500);
        }
    }

    showFeedback(text, type) {
        this.ui.feedbackMessage.textContent = text;
        this.ui.feedbackMessage.className = `feedback-message show ${type}`;
    }

    applyTransformation(photoIndex) {
        // Create magic wand effect
        this.createMagicWand();
        
        // Fade out effect
        this.ui.clientPhoto.classList.add('fade-out');
        
        setTimeout(() => {
            this.ui.clientPhoto.src = this.config.photos[photoIndex];
            
            this.ui.clientPhoto.onload = () => {
                this.ui.clientPhoto.classList.remove('fade-out');
            };
        }, 1250);

        setTimeout(() => {
            this.config.currentStep++;
            this.loadQuestion();
        }, 2500);
    }

    finishGame() {
        const accuracy = Math.round((this.config.correctAnswers / this.config.totalAnswers) * 100);
        const reward = this.config.correctAnswers * 10;
        
        this.ui.beforePhoto.src = this.config.photos[0];
        this.ui.afterPhoto.src = this.config.photos[4];
        
        document.getElementById('finalAccuracy').textContent = accuracy + '%';
        document.getElementById('finalReward').textContent = reward;
        
        let level = 'Новичок';
        if (accuracy >= 80) level = 'Профи';
        if (accuracy === 100) level = 'Мастер';
        document.getElementById('finalLevel').textContent = level;

        this.ui.progressBar.style.width = '100%';
        this.createConfetti();
        
        setTimeout(() => {
            this.ui.finalScreen.classList.add('show');
        }, 500);
    }

    createConfetti() {
        const colors = ['#93c5dd', '#c67a8f', '#9cb9ce', '#e6d480', '#ffcc99'];
        for (let i = 0; i < 50; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }, i * 50);
        }
    }

    restart() {
        this.config.currentStep = 0;
        this.config.correctAnswers = 0;
        this.config.totalAnswers = 0;
        
        this.ui.clientPhoto.classList.add('fade-out');
        setTimeout(() => {
            this.ui.clientPhoto.src = this.config.photos[0];
            this.ui.clientPhoto.classList.remove('fade-out');
        }, 600);
        
        this.ui.finalScreen.classList.remove('show');
        this.loadQuestion();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    window.game = new BeautyQuestGame();
});
</script>

</body>
</html>
