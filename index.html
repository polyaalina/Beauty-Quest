<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Quest: Neon Salon</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="%2300f2fe" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') 12 12, auto; }

body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
/* Неоновый фон */
background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
background-size: 400% 400%;
animation: gradientBG 15s ease infinite;
min-height: 100vh;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
color: #fff;
}

@keyframes gradientBG {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
}

.game-container {
width: 100%; max-width: 1200px; height: 90vh;
/* Эффект стекла с неоновой рамкой */
background: rgba(255, 255, 255, 0.05);
border-radius: 30px; 
border: 2px solid rgba(0, 242, 254, 0.3);
box-shadow: 0 0 20px rgba(0, 242, 254, 0.2), inset 0 0 20px rgba(0, 242, 254, 0.1);
overflow: hidden;
display: flex; flex-direction: column; position: relative;
backdrop-filter: blur(15px);
}

/* START SCREEN */
.start-screen {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(15, 12, 41, 0.9);
backdrop-filter: blur(10px);
display: flex; flex-direction: column; justify-content: center; align-items: center;
z-index: 2000; text-align: center;
}
.start-screen.hidden { display: none; }

.salon-title { 
    font-size: 72px; font-weight: 900; 
    /* Неоновый текст */
    color: #fff;
    text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe, 0 0 40px #00f2fe;
    margin-bottom: 40px; 
    animation: titleFloat 3s ease-in-out infinite, neonPulse 2s infinite alternate;
}

@keyframes neonPulse {
    from { text-shadow: 0 0 10px #00f2fe, 0 0 20px #00f2fe, 0 0 40px #00f2fe; }
    to { text-shadow: 0 0 20px #fc00ff, 0 0 30px #fc00ff, 0 0 50px #fc00ff; }
}

@keyframes titleFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.levels-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }

.level-card {
background: rgba(255,255,255,0.05); 
border: 2px solid rgba(0, 242, 254, 0.5);
border-radius: 20px; padding: 30px; width: 220px; cursor: pointer;
transition: all 0.3s ease; backdrop-filter: blur(5px);
box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
}
.level-card:hover { 
    transform: translateY(-10px) scale(1.05); 
    background: rgba(0, 242, 254, 0.1); 
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.6), 0 0 60px rgba(0, 242, 254, 0.4); 
    border-color: #00f2fe; 
}
.level-icon { font-size: 60px; margin-bottom: 15px; display: block; filter: drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
.level-name { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

.bg-selector {
position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
background: rgba(0, 0, 0, 0.4); padding: 10px 20px; border-radius: 50px;
backdrop-filter: blur(5px); display: flex; gap: 10px; align-items: center;
z-index: 2001; border: 1px solid rgba(255,255,255,0.2);
box-shadow: 0 0 10px rgba(0,0,0,0.5);
}
.bg-btn { width: 30px; height: 30px; border-radius: 50%; border: 2px solid white; cursor: pointer; transition: transform 0.2s; box-shadow: 0 0 10px currentColor; }
.bg-btn:hover { transform: scale(1.2); }
.file-upload-label {
display: inline-block; padding: 5px 15px; background: rgba(255,255,255,0.1);
border-radius: 20px; font-size: 12px; font-weight: bold; cursor: pointer;
color: white; text-shadow: 0 0 5px rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.3);
}
.file-upload-label:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,255,255,0.3); }
#bgInput { display: none; }

/* GAME HEADER */
.game-header {
background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px);
padding: 15px 30px; color: white; border-bottom: 1px solid rgba(0, 242, 254, 0.3);
box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 15px; }
.step-indicator { font-size: 20px; font-weight: bold; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
.controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.timer-btn { padding: 8px 15px; border: 2px solid rgba(0, 242, 254, 0.5); border-radius: 20px; background: rgba(0, 242, 254, 0.1); color: #00f2fe; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 13px; transition: all 0.3s; box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
.timer-btn:hover { transform: translateY(-2px); background: rgba(0, 242, 254, 0.2); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
.timer-btn.running { background: #ff0055; color: white; border-color: #ff0055; animation: pulse 1s infinite; box-shadow: 0 0 20px #ff0055; }
@keyframes pulse { 50% { transform: scale(1.05); box-shadow: 0 0 30px #ff0055; } }
.timer-container { margin-top: 10px; background: rgba(0,0,0,0.5); height: 8px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
.timer-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0055, #ffcc00, #00ff00, #00f2fe, #fc00ff); background-size: 400% 100%; animation: rainbow-move 2s linear infinite, timer-shrink 30s linear forwards; box-shadow: 0 0 10px currentColor; }
@keyframes rainbow-move { 100% { background-position: 400% 50%; } }
@keyframes timer-shrink { 100% { width: 0%; } }
.timer-text { font-size: 12px; text-align: center; margin-top: 4px; opacity: 0.9; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
.progress-container { background: rgba(0,0,0,0.5); height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; border: 1px solid rgba(255,255,255,0.1); }
.progress-bar { height: 100%; background: linear-gradient(90deg, #00f2fe, #fc00ff); width: 0%; transition: width 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55); border-radius: 5px; box-shadow: 0 0 15px #00f2fe; }

/* MAIN GAME AREA */
.game-main { flex: 1; display: flex; overflow: hidden; position: relative; }
.photo-section { flex: 1; background: rgba(0,0,0,0.2); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; padding: 20px 20px 20px 280px; position: relative; }
.photo-container { 
    width: 100%; max-width: 400px; height: 550px; 
    border-radius: 25px; overflow: visible; 
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.3), 0 0 60px rgba(0, 242, 254, 0.1); 
    position: relative; background: #000; 
    border: 3px solid rgba(0, 242, 254, 0.5); 
}
.client-photo { 
    width: 100%; height: 100%; 
    object-fit: cover; 
    transition: opacity 0.8s ease, transform 0.8s ease; 
    position: relative;
    z-index: 50;
    filter: brightness(1.1) contrast(1.1);
}
.client-photo.fade-out { opacity: 0; transform: scale(1.1); }
.client-photo.fade-in { opacity: 1; transform: scale(1); }
.magic-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; overflow: visible; }
.steps-panel { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.6); padding: 15px; border-radius: 15px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); z-index: 10; min-width: 180px; backdrop-filter: blur(10px); border: 1px solid rgba(0, 242, 254, 0.3); }
.step-item { display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; border-radius: 10px; transition: all 0.3s; opacity: 0.6; background: rgba(255,255,255,0.05); color: #ccc; font-size: 14px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1); }
.step-item.active { opacity: 1; background: rgba(0, 242, 254, 0.2); color: #fff; transform: scale(1.05) translateX(5px); box-shadow: 0 0 15px rgba(0, 242, 254, 0.4); border-color: #00f2fe; }
.step-item.completed { opacity: 1; background: rgba(252, 0, 255, 0.2); color: #fff; border-color: #fc00ff; box-shadow: 0 0 15px rgba(252, 0, 255, 0.4); }
.step-icon { width: 24px; height: 24px; filter: brightness(0) invert(1) drop-shadow(0 0 5px #fff); opacity: 0.8; }

/* ✅ ЗВЕЗДА ДЛЯ ОТЗЫВОВ (NEON) */
.review-star-btn {
    position: absolute;
    left: 25px;
    top: 310px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    z-index: 150;
    opacity: 0;
    transform: scale(0);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 20px currentColor;
    animation: starPulse 2s ease-in-out infinite;
    border: 2px solid rgba(255,255,255,0.5);
}
.review-star-btn.visible {
    opacity: 1;
    transform: scale(1);
}
.review-star-btn.girl { background: linear-gradient(135deg, #ff0055, #ffcc00); color: #ff0055; box-shadow: 0 0 20px #ff0055; }
.review-star-btn.woman { background: linear-gradient(135deg, #00f2fe, #fc00ff); color: #00f2fe; box-shadow: 0 0 20px #00f2fe; }
.review-star-btn.boy { background: linear-gradient(135deg, #00ff00, #00f2fe); color: #00ff00; box-shadow: 0 0 20px #00ff00; }
.review-star-btn:hover {
    transform: scale(1.15);
    box-shadow: 0 0 40px currentColor;
}
.review-star-btn svg {
    width: 28px;
    height: 28px;
    fill: white;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.8));
}
@keyframes starPulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 20px currentColor; }
    50% { transform: scale(1.1); box-shadow: 0 0 40px currentColor; }
}

/* ✅ ПЛАШКА С ОТЗЫВОМ (NEON) */
.message-plaque { 
    position: absolute; 
    top: 375px; 
    left: 20px; 
    background: rgba(0, 0, 0, 0.8); 
    color: #fff; 
    padding: 18px 22px; 
    border-radius: 20px; 
    box-shadow: 0 0 30px rgba(0, 242, 254, 0.4), inset 0 0 10px rgba(0, 242, 254, 0.2); 
    max-width: 260px; 
    width: auto; 
    z-index: 160; 
    opacity: 0; 
    transform: translateY(20px) scale(0.9); 
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    pointer-events: none; 
    border: 2px solid rgba(0, 242, 254, 0.5); 
    backdrop-filter: blur(10px);
}
.message-plaque.show { 
    opacity: 1; 
    transform: translateY(0) scale(1); 
    pointer-events: auto; 
}
.message-plaque::before { 
    content: ''; 
    position: absolute; 
    top: -10px; 
    left: 60px; 
    border-width: 0 10px 10px 10px; 
    border-style: solid; 
    border-color: transparent transparent rgba(0, 242, 254, 0.5) transparent; 
    filter: drop-shadow(0 -5px 5px rgba(0, 242, 254, 0.5));
}
.message-text { 
    font-size: 14px; 
    line-height: 1.5; 
    text-align: center; 
    font-weight: 700; 
    color: #fff;
    text-shadow: 0 0 5px rgba(255,255,255,0.5);
}
.close-btn { 
    position: absolute; 
    top: 8px; 
    right: 10px; 
    width: 18px; 
    height: 18px; 
    cursor: pointer; 
    opacity: 0.5; 
}
.close-btn:hover { opacity: 1; filter: drop-shadow(0 0 5px #fff); }
.close-btn::before, .close-btn::after { 
    content: ''; 
    position: absolute; 
    top: 50%; 
    left: 50%; 
    width: 16px; 
    height: 2px; 
    background: #fff; 
    border-radius: 2px; 
    transform: translate(-50%, -50%) rotate(45deg); 
    box-shadow: 0 0 5px #fff;
}
.close-btn::after { transform: translate(-50%, -50%) rotate(-45deg); }

.quiz-section { width: 450px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(15px); padding: 30px; display: flex; flex-direction: column; justify-content: center; border-left: 1px solid rgba(0, 242, 254, 0.3); }
.question-card { background: rgba(255,255,255,0.05); color: #fff; padding: 25px; border-radius: 20px; margin-bottom: 25px; box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); border: 1px solid rgba(255,255,255,0.1); }
.question-title { font-size: 22px; margin-bottom: 10px; font-weight: 800; line-height: 1.2; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
.question-hint { font-size: 14px; opacity: 0.7; font-style: italic; }
.options-list { display: flex; flex-direction: column; gap: 12px; }
.option-btn { padding: 18px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff; border-radius: 15px; cursor: pointer; font-size: 16px; font-weight: 600; transition: all 0.2s; text-align: left; display: flex; align-items: center; gap: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
.option-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); border-color: rgba(0, 242, 254, 0.5); }
.option-btn.correct { background: rgba(0, 255, 100, 0.2); color: #00ff64; border-color: #00ff64; animation: pop 0.4s ease; box-shadow: 0 0 20px #00ff64; }
.option-btn.wrong { background: rgba(255, 0, 85, 0.2); color: #ff0055; border-color: #ff0055; animation: shake 0.4s ease; box-shadow: 0 0 20px #ff0055; }
@keyframes pop { 50% { transform: scale(1.05); } }
@keyframes shake { 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
.feedback-message { margin-top: 20px; padding: 15px; border-radius: 12px; text-align: center; font-weight: bold; font-size: 16px; opacity: 0; transform: translateY(-10px); transition: all 0.3s; }
.feedback-message.show { opacity: 1; transform: translateY(0); }
.feedback-message.success { background: rgba(0, 255, 100, 0.1); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.3); box-shadow: 0 0 15px rgba(0, 255, 100, 0.2); }
.feedback-message.error { background: rgba(255, 0, 85, 0.1); color: #ff0055; border: 1px solid rgba(255, 0, 85, 0.3); box-shadow: 0 0 15px rgba(255, 0, 85, 0.2); }

/* FINAL SCREEN */
.final-screen {
position: absolute; top: 0; left: 0; width: 100%; height: 100%;
background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
display: flex; flex-direction: column; justify-content: center; align-items: center;
color: white; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.6s; padding: 20px;
}
.final-screen.show { opacity: 1; pointer-events: all; }
.final-header { text-align: center; margin-bottom: 20px; animation: slideDown 0.8s ease-out; }
@keyframes slideDown { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.final-title {
font-size: 36px; font-weight: 900; margin: 0;
color: #fff;
text-shadow: 0 0 10px #fc00ff, 0 0 20px #fc00ff, 0 0 40px #fc00ff;
letter-spacing: 1px;
}
.before-after-container {
display: flex; gap: 30px; margin: 10px 0 30px 0; align-items: center; flex-wrap: wrap; justify-content: center;
animation: zoomIn 0.8s ease-out 0.2s backwards;
}
@keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.photo-comparison { text-align: center; position: relative; }
.photo-label {
position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
background: linear-gradient(135deg, #00f2fe, #fc00ff);
padding: 8px 20px; border-radius: 20px; font-size: 16px; font-weight: bold;
box-shadow: 0 0 20px rgba(0, 242, 254, 0.5); white-space: nowrap; z-index: 10;
display: flex; align-items: center; gap: 8px;
}
.photo-comparison img {
width: 220px; height: 320px; object-fit: cover; border-radius: 20px;
box-shadow: 0 0 30px rgba(0, 242, 254, 0.4); border: 3px solid rgba(0, 242, 254, 0.5); background: #000;
}
.transformed-arrow {
display: flex; align-items: center; justify-content: center;
width: 60px; height: 60px; border-radius: 50%;
background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
animation: arrowPulse 1.5s ease infinite; position: relative; color: #00f2fe; font-size: 28px;
border: 2px solid rgba(0, 242, 254, 0.5);
}
@keyframes arrowPulse { 50% { transform: scale(1.1); box-shadow: 0 0 30px rgba(0, 242, 254, 0.6); } }
.final-stats-container {
background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
padding: 25px 40px; border-radius: 25px; margin-bottom: 25px;
border: 1px solid rgba(0, 242, 254, 0.3); box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
text-align: center; animation: slideUp 0.8s ease-out 0.4s backwards; min-width: 300px;
}
@keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.stat-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; font-size: 18px; font-weight: 600; text-shadow: 0 0 10px rgba(255,255,255,0.3); padding: 0 10px; }
.stat-icon { width: 24px; height: 24px; margin-right: 10px; filter: drop-shadow(0 0 5px #fff); }
.stat-value { color: #00f2fe; font-weight: 800; font-size: 20px; text-shadow: 0 0 10px #00f2fe; }

/* HOME BUTTON */
.home-btn-fixed {
position: fixed;
bottom: 30px;
right: 30px;
width: 60px;
height: 60px;
background: rgba(0, 242, 254, 0.1);
backdrop-filter: blur(8px);
border: 2px solid rgba(0, 242, 254, 0.5);
border-radius: 50%;
display: flex;
justify-content: center;
align-items: center;
cursor: pointer;
z-index: 4000;
transition: all 0.3s;
box-shadow: 0 0 20px rgba(0, 242, 254, 0.3);
}
.home-btn-fixed:hover {
background: rgba(0, 242, 254, 0.2);
transform: scale(1.1) rotate(10deg);
box-shadow: 0 0 40px rgba(0, 242, 254, 0.6);
}
.home-btn-fixed svg {
width: 32px;
height: 32px;
fill: #00f2fe;
filter: drop-shadow(0 0 5px #00f2fe);
}

/* Timeout Modal */
.timeout-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 3000; }
.timeout-content { background: rgba(20, 20, 40, 0.95); padding: 30px; border-radius: 25px; text-align: center; max-width: 400px; width: 90%; animation: popup 0.4s ease; box-shadow: 0 0 50px rgba(255, 0, 85, 0.4); border: 2px solid #ff0055; }
@keyframes popup { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
.timeout-icon { font-size: 50px; margin-bottom: 15px; filter: drop-shadow(0 0 10px #ff0055); }
.timeout-title { color: #ff0055; font-size: 24px; margin-bottom: 10px; font-weight: 800; text-shadow: 0 0 10px #ff0055; }
.timeout-message { color: #fff; font-size: 16px; margin-bottom: 20px; line-height: 1.5; white-space: pre-line; }
.timeout-btn { background: linear-gradient(180deg, #00f2fe, #0099ff); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-size: 16px; font-weight: bold; display: flex; align-items: center; gap: 8px; margin: 0 auto; box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }
.timeout-btn:hover { transform: translateY(-2px); box-shadow: 0 0 40px rgba(0, 242, 254, 0.6); }

/* Effects */
.sparkle, .heart, .star, .sparkle-particle, .magic-orb, .particle, .sparkle-burst, .star-burst { position: absolute; pointer-events: none; }

/* Частицы */
.particle {
    position: absolute;
    border-radius: 50%;
    z-index: 120;
    opacity: 1;
    animation: particleDissolve 1.5s ease-out forwards;
    box-shadow: 0 0 15px currentColor, 0 0 30px currentColor, 0 0 45px currentColor;
}
@keyframes particleDissolve {
    0% { opacity: 1; transform: scale(1.5) translate(0, 0) rotate(0deg); }
    50% { opacity: 0.8; transform: scale(0.8) translate(var(--tx), var(--ty)) rotate(180deg); }
    100% { opacity: 0; transform: scale(0) translate(calc(var(--tx) * 2.5), calc(var(--ty) * 2.5)) rotate(360deg); }
}

/* Блёстки */
.sparkle-burst {
    position: absolute;
    width: 15px;
    height: 15px;
    background: radial-gradient(circle, white 0%, #ffd700 50%, transparent 70%);
    border-radius: 50%;
    z-index: 130;
    animation: sparkleBurst 1s ease-out forwards;
    box-shadow: 0 0 20px #ffd700, 0 0 40px white;
}
@keyframes sparkleBurst {
    0% { opacity: 1; transform: scale(0) rotate(0deg); }
    30% { opacity: 1; transform: scale(1.5) rotate(90deg); }
    100% { opacity: 0; transform: scale(0.3) translate(var(--sx), var(--sy)) rotate(180deg); }
}

/* Звёзды */
.star-burst {
    position: absolute;
    width: 20px;
    height: 20px;
    background: white;
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    z-index: 125;
    animation: starFly 1.2s ease-out forwards;
    box-shadow: 0 0 15px white, 0 0 30px #ffd700;
}
@keyframes starFly {
    0% { opacity: 1; transform: scale(0) translateY(0); }
    30% { opacity: 1; transform: scale(1.3) translateY(-30px); }
    100% { opacity: 0; transform: scale(0.2) translateY(-100px); }
}

{ text: "Обувь?", hint: "Для прогулок", options: [{ text: "Туфли", icon: "👞", correct: false, photoIndex: 3 }, { text: "Кроссовки", icon: "👟", correct: true, photoIndex: 4 }, { text: "Сапоги", icon: "👢", correct: false, photoIndex: 3 }], correctPhotoIndex: 4 }
]
}
}
};
this.ui = {
startScreen: document.getElementById('startScreen'),
currentStep: document.getElementById('currentStep'),
totalSteps: document.getElementById('totalSteps'),
progressBar: document.getElementById('progressBar'),
questionText: document.getElementById('questionText'),
optionsList: document.getElementById('optionsList'),
feedbackMessage: document.getElementById('feedbackMessage'),
finalScreen: document.getElementById('finalScreen'),
clientPhoto: document.getElementById('clientPhoto'),
beforePhoto: document.getElementById('beforePhoto'),
afterPhoto: document.getElementById('afterPhoto'),
photoContainer: document.getElementById('photoContainer'),
magicContainer: document.getElementById('magicContainer'),
messagePlaque: document.getElementById('messagePlaque'),
messageText: document.getElementById('messageText'),
reviewStarBtn: document.getElementById('reviewStarBtn'),
timerBar: document.getElementById('timerBar'),
timeoutModal: document.getElementById('timeoutModal'),
timeoutIcon: document.getElementById('timeoutIcon'),
timeoutMessage: document.getElementById('timeoutMessage'),
timerBtn: document.getElementById('timerBtn'),
timerBtnText: document.getElementById('timerBtnText'),
finalLevel: document.getElementById('finalLevel'),
finalAccuracy: document.getElementById('finalAccuracy'),
finalReward: document.getElementById('finalReward'),
stepsPanel: document.getElementById('stepsPanel'),
magicSound: document.getElementById('magicSound')
};
this.timerInterval = null;
this.TIMER_DURATION = 30000;
this.init();
}

init() {
this.ui.totalSteps.textContent = this.config.totalSteps;
this.initMouseTrail();
this.enableAudio();
}

enableAudio() {
const unlockAudio = () => {
if (!this.config.audioEnabled && this.ui.magicSound) {
this.ui.magicSound.play().then(() => {
this.ui.magicSound.pause();
this.ui.magicSound.currentTime = 0;
this.config.audioEnabled = true;
console.log('🔊 Звук активирован!');
}).catch(e => {
console.log('⚠️ Ожидание клика для звука...', e);
});
document.removeEventListener('click', unlockAudio);
document.removeEventListener('keydown', unlockAudio);
document.removeEventListener('touchstart', unlockAudio);
}
};
document.addEventListener('click', unlockAudio);
document.addEventListener('keydown', unlockAudio);
document.addEventListener('touchstart', unlockAudio);
}

selectLevel(level) {
this.config.difficulty = level;
this.startGame();
}

startGame() {
this.config.gameStarted = true;
this.config.timerRunning = false;
this.config.reviewsAvailable = false;
this.ui.startScreen.classList.add('hidden');
this.hideReviewStar();
this.closeMessage();
const levelData = this.config.levelsConfig[this.config.difficulty];
this.ui.stepsPanel.innerHTML = '';
levelData.steps.forEach((step, index) => {
const div = document.createElement('div');
div.className = `step-item ${index === 0 ? 'active' : ''}`;
div.dataset.step = index;
div.innerHTML = `<img src="${step.icon}" class="step-icon"><span>${step.text}</span>`;
this.ui.stepsPanel.appendChild(div);
});
if (this.config.difficulty === 'pro') this.config.photos = this.config.photosPro;
else if (this.config.difficulty === 'master') this.config.photos = this.config.photosMaster;
else this.config.photos = this.config.photosNovice;
this.config.questions = levelData.questions;
this.config.availablePhrases = [];
this.ui.clientPhoto.src = this.config.photos[0];
this.ui.timerBar.style.animation = 'none';
this.ui.timerBar.offsetHeight;
this.loadQuestion();
}

changeBg(bgStyle) {
document.body.style.background = bgStyle;
document.body.style.backgroundSize = 'cover';
document.body.style.backgroundPosition = 'center';
}

uploadBg(input) {
if (input.files && input.files[0]) {
const reader = new FileReader();
reader.onload = (e) => {
document.body.style.background = `url(${e.target.result})`;
document.body.style.backgroundSize = 'cover';
document.body.style.backgroundPosition = 'center';
};
reader.readAsDataURL(input.files[0]);
}
}

toggleTimer() {
if (this.config.timerRunning) { this.stopTimer(); } else { this.startTimer(); }
}

startTimer() {
if (this.config.timerRunning) return;
this.config.timerRunning = true;
this.ui.timerBtn.classList.add('running');
this.ui.timerBtnText.textContent = 'Стоп';
const timerBar = this.ui.timerBar;
timerBar.style.animation = 'none';
timerBar.offsetHeight;
timerBar.style.animation = 'rainbow-move 2s linear infinite, timer-shrink 30s linear forwards';
this.timerInterval = setTimeout(() => {
if (this.config.gameStarted && this.config.timerRunning) { this.showTimeoutModal(); }
}, this.TIMER_DURATION);
}

stopTimer() {
this.config.timerRunning = false;
clearInterval(this.timerInterval);
this.ui.timerBar.style.animation = 'none';
this.ui.timerBtn.classList.remove('running');
this.ui.timerBtnText.textContent = 'Старт';
}

showTimeoutModal() {
this.config.timerRunning = false;
this.stopTimer();
const randomMsg = this.config.timeoutMessages[Math.floor(Math.random() * this.config.timeoutMessages.length)];
this.ui.timeoutIcon.textContent = randomMsg.icon;
this.ui.timeoutMessage.textContent = randomMsg.text;
this.ui.timeoutModal.style.display = 'flex';
}

continueFromTimeout() {
this.ui.timeoutModal.style.display = 'none';
this.config.timerRunning = false;
this.ui.timerBtnText.textContent = 'Старт';
}

initMouseTrail() {
let lastTrailTime = 0;
document.addEventListener('mousemove', (e) => {
const currentTime = Date.now();
if (currentTime - lastTrailTime > 40) {
lastTrailTime = currentTime;
const type = Math.random() > 0.5 ? 'heart' : 'star';
const trail = document.createElement('div');
if (type === 'heart') { trail.className = 'mouse-trail-heart'; }
else { trail.className = 'mouse-trail-star'; }
trail.style.left = (e.clientX - 6) + 'px';
trail.style.top = (e.clientY - 6) + 'px';
document.body.appendChild(trail);
setTimeout(() => trail.remove(), 800);
}
});
}

createMagicOrb() {
const container = this.ui.magicContainer; container.innerHTML = '';
const orb = document.createElement('div'); orb.className = 'magic-orb'; container.appendChild(orb);
const duration = 2000, startTime = Date.now();
const centerX = container.offsetWidth / 2, centerY = container.offsetHeight / 2 + 20, scale = 80;
let colorIndex = 0;
const animateOrb = () => {
const elapsed = Date.now() - startTime, progress = elapsed / duration;
if (progress < 1) {
const t = progress * Math.PI * 2;
const heartX = 16 * Math.pow(Math.sin(t), 3);
const heartY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
const x = centerX + heartX * (scale / 16) - 12.5, y = centerY + heartY * (scale / 16) - 12.5;
orb.style.left = x + 'px'; orb.style.top = y + 'px';
const colorProgress = progress * this.config.gameColors.length;
colorIndex = Math.floor(colorProgress);
const nextColorIndex = (colorIndex + 1) % this.config.gameColors.length;
const currentColor = this.config.gameColors[colorIndex % this.config.gameColors.length];
orb.style.background = `radial-gradient(circle at 30% 30%, ${this.lightenColor(currentColor, 20)}, ${currentColor}, ${this.config.gameColors[nextColorIndex]})`;
orb.style.color = currentColor;
if (elapsed % 100 < 40) { this.createTrail(x + 12.5, y + 12.5, container, currentColor); }
requestAnimationFrame(animateOrb);
} else { orb.remove(); }
};
animateOrb();
}

createTrail(x, y, container, color) {
const heart = document.createElement('div'); heart.className = 'heart'; heart.style.background = color; heart.style.boxShadow = `0 0 10px ${color}`; heart.style.left = x + 'px'; heart.style.top = y + 'px'; container.appendChild(heart);
const star = document.createElement('div'); star.className = 'star'; star.style.boxShadow = `0 0 10px white`; star.style.left = (x - 10) + 'px'; star.style.top = (y - 10) + 'px'; container.appendChild(star);
for (let i = 0; i < 3; i++) {
setTimeout(() => {
const sparkle = document.createElement('div'); sparkle.className = 'sparkle-particle';
const angle = (Math.random() * Math.PI * 2), dist = 15 + Math.random() * 30;
sparkle.style.setProperty('--tx', Math.cos(angle) * dist + 'px'); sparkle.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
sparkle.style.background = `radial-gradient(circle, white 0%, ${color} 50%, transparent 70%)`;
sparkle.style.left = x + 'px'; sparkle.style.top = y + 'px'; container.appendChild(sparkle);
setTimeout(() => sparkle.remove(), 1000);
}, i * 80);
}
setTimeout(() => { if (heart.parentNode) heart.remove(); if (star.parentNode) star.remove(); }, 1500);
}

lightenColor(color, percent) {
const num = parseInt(color.replace('#', ''), 16), amt = Math.round(2.55 * percent);
const R = (num >> 16) + amt, G = (num >> 8 & 0x00FF) + amt, B = (num & 0x0000FF) + amt;
return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 + (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 + (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);
}

shuffleArray(array) { const shuffled = [...array]; for (let i = shuffled.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]; } return shuffled; }

loadQuestion() {
if (this.config.currentStep >= this.config.questions.length) { this.finishGame(); return; }
const question = this.config.questions[this.config.currentStep];
this.ui.currentStep.textContent = this.config.currentStep + 1;
const progress = ((this.config.currentStep) / this.config.totalSteps) * 100;
this.ui.progressBar.style.width = progress + '%';
this.ui.questionText.textContent = question.text;
this.ui.optionsList.innerHTML = '';
const shuffledOptions = this.shuffleArray(question.options);
shuffledOptions.forEach((option) => {
const btn = document.createElement('button'); btn.className = 'option-btn';
btn.innerHTML = `<span style="font-size: 24px">${option.icon}</span> <span>${option.text}</span>`;
btn.onclick = () => this.checkAnswer(option.correct, btn, option.photoIndex);
this.ui.optionsList.appendChild(btn);
});
document.querySelectorAll('.step-item').forEach((item, index) => {
item.classList.remove('active', 'completed');
if (index < this.config.currentStep) item.classList.add('completed');
else if (index === this.config.currentStep) item.classList.add('active');
});
this.ui.feedbackMessage.className = 'feedback-message'; this.ui.feedbackMessage.textContent = '';
}

checkAnswer(isCorrect, btnElement, photoIndex) {
this.config.totalAnswers++;
const buttons = this.ui.optionsList.querySelectorAll('.option-btn');
buttons.forEach(btn => btn.disabled = true);
if (isCorrect) {
this.config.correctAnswers++; btnElement.classList.add('correct');
this.showFeedback('Преображаем! ✨', 'success');
setTimeout(() => { this.applyTransformation(photoIndex); }, 800);
} else {
btnElement.classList.add('wrong'); this.showFeedback('Попробуй ещё раз! 💪', 'error');
setTimeout(() => { btnElement.classList.remove('wrong'); buttons.forEach(btn => btn.disabled = false); this.ui.feedbackMessage.classList.remove('show'); }, 1200);
}
}

showFeedback(text, type) { this.ui.feedbackMessage.textContent = text; this.ui.feedbackMessage.className = `feedback-message show ${type}`; }

applyTransformation(photoIndex) {
this.playMagicSound();
this.createMagicOrb();
this.createParticleDissolve(150);
this.createSparkles(50);
this.createStars(30);

this.ui.photoContainer.classList.add('transitioning');
this.ui.clientPhoto.classList.add('fade-out');

setTimeout(() => {
this.ui.clientPhoto.src = this.config.photos[photoIndex];
this.ui.clientPhoto.onload = () => {
this.ui.clientPhoto.classList.remove('fade-out');
this.ui.clientPhoto.classList.add('fade-in');
this.ui.photoContainer.classList.remove('transitioning');
if (photoIndex > 0) {
this.config.reviewsAvailable = true;
this.showReviewStar();
}
};
}, 1000);

setTimeout(() => { 
this.ui.clientPhoto.classList.remove('fade-in');
this.config.currentStep++; 
this.loadQuestion(); 
}, 2000);
}

createParticleDissolve(count = 150) {
const container = this.ui.magicContainer;
const colors = ['#ff0055', '#ffcc00', '#00f2fe', '#fc00ff', '#00ff00', '#ffffff'];
for (let i = 0; i < count; i++) {
setTimeout(() => {
const particle = document.createElement('div');
particle.className = 'particle';
const startX = Math.random() * 100;
const startY = Math.random() * 100;
const angle = Math.random() * Math.PI * 2;
const distance = 150 + Math.random() * 200;
const tx = Math.cos(angle) * distance;
const ty = Math.sin(angle) * distance;
const color = colors[Math.floor(Math.random() * colors.length)];
particle.style.left = startX + '%';
particle.style.top = startY + '%';
particle.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
particle.style.color = color;
particle.style.setProperty('--tx', tx + 'px');
particle.style.setProperty('--ty', ty + 'px');
particle.style.width = (8 + Math.random() * 10) + 'px';
particle.style.height = particle.style.width;
container.appendChild(particle);
setTimeout(() => { if (particle.parentNode) particle.remove(); }, 1500);
}, i * 10);
}
}

createSparkles(count = 50) {
const container = this.ui.magicContainer;
for (let i = 0; i < count; i++) {
setTimeout(() => {
const sparkle = document.createElement('div');
sparkle.className = 'sparkle-burst';
const startX = 30 + Math.random() * 40;
const startY = 30 + Math.random() * 40;
const angle = Math.random() * Math.PI * 2;
const distance = 50 + Math.random() * 100;
const sx = Math.cos(angle) * distance;
const sy = Math.sin(angle) * distance;
sparkle.style.left = startX + '%';
sparkle.style.top = startY + '%';
sparkle.style.setProperty('--sx', sx + 'px');
sparkle.style.setProperty('--sy', sy + 'px');
container.appendChild(sparkle);
setTimeout(() => { if (sparkle.parentNode) sparkle.remove(); }, 1000);
}, i * 20);
}
}

createStars(count = 30) {
const container = this.ui.magicContainer;
for (let i = 0; i < count; i++) {
setTimeout(() => {
const star = document.createElement('div');
star.className = 'star-burst';
const startX = 20 + Math.random() * 60;
const startY = 20 + Math.random() * 60;
star.style.left = startX + '%';
star.style.top = startY + '%';
container.appendChild(star);
setTimeout(() => { if (star.parentNode) star.remove(); }, 1200);
}, i * 30);
}
}

playMagicSound() {
if (this.ui.magicSound && this.config.audioEnabled) {
this.ui.magicSound.currentTime = 0;
this.ui.magicSound.volume = 0.5;
this.ui.magicSound.play().catch(e => console.log('Ошибка звука:', e));
}
}

showReviewStar() {
let starType;
if (this.config.difficulty === 'master') starType = 'boy';
else if (this.config.difficulty === 'pro') starType = 'woman';
else starType = 'girl';
this.ui.reviewStarBtn.className = `review-star-btn visible ${starType}`;
}

hideReviewStar() {
this.ui.reviewStarBtn.className = 'review-star-btn';
}

toggleReview() {
if (!this.config.reviewsAvailable) return;
if (this.ui.messagePlaque.classList.contains('show')) {
this.closeMessage();
} else {
this.showMessage();
}
}

showMessage() {
if (!this.config.gameStarted || !this.config.reviewsAvailable) return;
let phraseList;
if (this.config.difficulty === 'master') phraseList = this.config.phrasesBoy;
else if (this.config.difficulty === 'pro') phraseList = this.config.phrasesWoman;
else phraseList = this.config.phrasesGirl;

if (!this.config.availablePhrases || this.config.availablePhrases.length === 0) {
this.config.availablePhrases = this.shuffleArray(phraseList);
}
const randomIndex = Math.floor(Math.random() * this.config.availablePhrases.length);
const chosenPhrase = this.config.availablePhrases[randomIndex];
this.config.availablePhrases.splice(randomIndex, 1);
if (this.config.availablePhrases.length < 2) this.config.availablePhrases = this.shuffleArray(phraseList);

this.ui.messageText.textContent = chosenPhrase;
this.ui.messagePlaque.classList.add('show');
}

closeMessage() { 
this.ui.messagePlaque.classList.remove('show'); 
}

finishGame() {
this.stopTimer();
this.hideReviewStar();
this.closeMessage();
const accuracy = Math.round((this.config.correctAnswers / this.config.totalAnswers) * 100);
const reward = this.config.correctAnswers * 10;
this.ui.beforePhoto.src = this.config.photos[0];
this.ui.afterPhoto.src = this.config.photos[4];
this.ui.finalAccuracy.textContent = accuracy + '%';
this.ui.finalReward.textContent = reward;
let levelName = 'Новичок';
if (this.config.difficulty === 'pro') levelName = 'Профи';
if (this.config.difficulty === 'master') levelName = 'Мастер';
this.ui.finalLevel.textContent = levelName;
this.ui.progressBar.style.width = '100%';
this.createConfetti();
setTimeout(() => { this.ui.finalScreen.classList.add('show'); }, 400);
}

createConfetti() {
const colors = ['#ff0055', '#ffcc00', '#00f2fe', '#fc00ff', '#00ff00'];
for (let i = 0; i < 40; i++) {
setTimeout(() => {
const confetti = document.createElement('div'); confetti.className = 'confetti';
confetti.style.left = Math.random() * 100 + '%'; confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0'; confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
document.body.appendChild(confetti); setTimeout(() => confetti.remove(), 2500);
}, i * 40);
}
}

goToStart() {
this.ui.finalScreen.classList.remove('show');
this.ui.startScreen.classList.remove('hidden');
this.config.reviewsAvailable = false;
this.hideReviewStar();
this.closeMessage();
this.config.currentStep = 0;
this.config.correctAnswers = 0;
this.config.totalAnswers = 0;
this.config.gameStarted = false;
this.stopTimer();
}
}

document.addEventListener('DOMContentLoaded', () => {
window.game = new BeautyQuestGame();
});
</script>
